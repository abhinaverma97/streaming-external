services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATA_DIR=/app/.cache
    volumes:
      - cache-data:/app/.cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/source-prefs"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  cache-data:
  caddy_data:
  caddy_config:
