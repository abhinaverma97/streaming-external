version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: movie-site-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./.cache:/app/.cache
    environment:
      - NODE_ENV=production

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: movie-site-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - backend
