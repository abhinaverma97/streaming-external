services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATA_DIR=/app/.cache
    volumes:
      - cache-data:/app/.cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
    retries: 3

volumes:
  cache-data:
